<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Guard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .header h1 {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.5rem;
  }

  .header .subtitle {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
  }

  .gauge-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .gauge {
    position: relative;
    width: 260px;
    height: 260px;
  }

  .gauge svg {
    width: 100%;
    height: 100%;
  }

  .gauge-track {
    fill: none;
    stroke: #1a1a1a;
    stroke-width: 12;
  }

  .gauge-fill {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;
  }

  .gauge-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .voltage-display {
    font-size: 52px;
    font-weight: bold;
    letter-spacing: -2px;
    line-height: 1;
    transition: color 0.5s ease;
  }

  .voltage-unit {
    font-size: 16px;
    color: #444;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .voltage-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
    margin-top: 8px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .stat {
    background: #0d0d0d;
    padding: 1rem;
    text-align: center;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 18px;
    color: #666;
    transition: color 0.3s;
  }

  .stat-value.active { color: #e8e8e8; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2rem;
    padding: 10px 14px;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.connecting { background: #664400; animation: pulse 1s infinite; }
  .status-dot.connected  { background: #1a5c2e; }
  .status-dot.error      { background: #5c1a1a; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .status-text {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #444;
    flex: 1;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid #222;
    border-radius: 4px;
    color: #555;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .btn:hover:not(:disabled) {
    border-color: #444;
    color: #888;
    background: #111;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn.disconnect {
    border-color: #2a1010;
    color: #442222;
  }

  .btn.disconnect:hover:not(:disabled) {
    border-color: #5c1a1a;
    color: #884444;
  }

  .history {
    margin-top: 1.5rem;
    height: 60px;
    position: relative;
  }

  .history svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .history-path {
    fill: none;
    stroke: #1e3a1e;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Intact Battery-Guard</h1>
    <div class="subtitle">BLE-VoltageCheck</div>
  </div>

  <div class="gauge-wrap">
    <div class="gauge">
      <svg viewBox="0 0 260 260">
        <circle class="gauge-track" cx="130" cy="130" r="100"
          stroke-dasharray="565.49"
          stroke-dashoffset="141.37"
          transform="rotate(126 130 130)" />
        <circle class="gauge-fill" id="gaugeFill" cx="130" cy="130" r="100"
          stroke="#1e3a1e"
          stroke-dasharray="565.49"
          stroke-dashoffset="565.49"
          transform="rotate(126 130 130)" />
      </svg>
      <div class="gauge-center">
        <div class="voltage-display" id="voltDisplay">--.-</div>
        <div class="voltage-unit">Volt</div>
        <div class="voltage-sub" id="voltStatus">warten</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Min</div>
      <div class="stat-value" id="statMin">--.-</div>
    </div>
    <div class="stat">
      <div class="stat-label">Aktuell</div>
      <div class="stat-value" id="statCur">--.-</div>
    </div>
    <div class="stat">
      <div class="stat-label">Max</div>
      <div class="stat-value" id="statMax">--.-</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Nicht verbunden</div>
  </div>

  <button class="btn" id="connectBtn" onclick="connect()">Verbinden</button>
  <button class="btn disconnect" id="disconnectBtn" onclick="disconnect()" disabled style="margin-top:8px">Trennen</button>

  <div class="history">
    <svg id="histSvg" viewBox="0 0 480 60" preserveAspectRatio="none">
      <path class="history-path" id="histPath" d="" />
    </svg>
  </div>

</div>

<script>
const SERVICE_UUID = '00001814-0000-1000-8000-00805f9b34fb';
const CHAR_UUID    = '00002a53-0000-1000-8000-00805f9b34fb';

const MIN_V = 9.0;
const MAX_V = 14.4;
const ARC   = 424.12;

let device = null;
let server = null;
let characteristic = null;
let minV = Infinity, maxV = -Infinity;
let history = [];

function getColor(v) {
  if (v === null) return '#1e3a1e';
  if (v < 10.5) return '#5c1a1a';
  if (v < 11.5) return '#664400';
  if (v < 12.4) return '#665500';
  return '#1a5c2e';
}

function getLabel(v) {
  if (v === null) return 'keine daten';
  if (v < 10.5) return 'kritisch';
  if (v < 11.5) return 'niedrig';
  if (v < 12.4) return 'ok';
  if (v < 12.8) return 'gut';
  return 'voll';
}

function updateGauge(v) {
  const fill = document.getElementById('gaugeFill');
  const disp = document.getElementById('voltDisplay');
  const sub  = document.getElementById('voltStatus');
  const cur  = document.getElementById('statCur');

  const pct    = Math.max(0, Math.min(1, (v - MIN_V) / (MAX_V - MIN_V)));
  const offset = ARC - pct * ARC;
  const color  = getColor(v);

  fill.style.strokeDashoffset = offset;
  fill.style.stroke = color;
  disp.style.color  = color;
  disp.textContent  = v.toFixed(2);
  sub.textContent   = getLabel(v);
  cur.textContent   = v.toFixed(2);
  cur.classList.add('active');

  if (v < minV) {
    minV = v;
    const el = document.getElementById('statMin');
    el.textContent = v.toFixed(2);
    el.classList.add('active');
  }
  if (v > maxV) {
    maxV = v;
    const el = document.getElementById('statMax');
    el.textContent = v.toFixed(2);
    el.classList.add('active');
  }

  history.push(v);
  if (history.length > 80) history.shift();
  drawHistory();
}

function drawHistory() {
  if (history.length < 2) return;
  const W = 480, H = 60;
  const pts = history.map((v, i) => {
    const x = (i / (history.length - 1)) * W;
    const y = H - ((v - MIN_V) / (MAX_V - MIN_V)) * H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  document.getElementById('histPath').setAttribute('d', 'M' + pts.join('L'));
}

function setStatus(state, text) {
  const dot  = document.getElementById('statusDot');
  const txt  = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function onNotify(event) {
  const data  = event.target.value;
  const bytes = new Uint8Array(data.buffer);
  if (bytes.length < 3) return;
  const raw = bytes[1] | (bytes[2] << 8);
  const v   = raw / 1000;
  if (v > 5 && v < 20) updateGauge(v);
}

async function connect() {
  try {
    setStatus('connecting', 'Suche nach Gerät…');
    document.getElementById('connectBtn').disabled = true;

    if (!navigator.bluetooth) {
      throw new Error('Web Bluetooth nicht verfügbar – bitte in Bluefy öffnen');
    }

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    device.addEventListener('gattserverdisconnected', onDisconnected);
    setStatus('connecting', 'Verbinde…');

    server         = await device.gatt.connect();
    const service  = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);

    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', onNotify);

    setStatus('connected', 'Verbunden · ' + (device.name || 'BLE-VoltageCheck'));
    document.getElementById('disconnectBtn').disabled = false;

  } catch (e) {
    const msg = e?.message || String(e) || 'Unbekannter Fehler';
    setStatus('error', 'Fehler: ' + msg);
    document.getElementById('connectBtn').disabled = false;
  }
}

async function disconnect() {
  if (characteristic) {
    try { await characteristic.stopNotifications(); } catch {}
    characteristic.removeEventListener('characteristicvaluechanged', onNotify);
  }
  if (device && device.gatt.connected) device.gatt.disconnect();
  onDisconnected();
}

function onDisconnected() {
  setStatus('', 'Nicht verbunden');
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('disconnectBtn').disabled = true;
  document.getElementById('voltStatus').textContent = 'getrennt';
}
</script>
</body>
</html>
